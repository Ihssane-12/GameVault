<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div id="app" class="min-h-screen">
    <header class="bg-slate-900 text-white shadow">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
        <h1 class="text-xl font-bold">GameVault</h1>
        <nav class="hidden items-center gap-2 sm:flex">
          <button id="homeBtn" class="rounded bg-white/10 px-3 py-1.5 text-sm font-medium hover:bg-white/20">Home</button>
          <button id="cartBtn" class="rounded bg-white/10 px-3 py-1.5 text-sm font-medium hover:bg-white/20">Cart (0)</button>
        </nav>
        <button id="mobileCartBtn" class="rounded bg-white/10 px-3 py-1.5 text-sm font-medium hover:bg-white/20 sm:hidden">Cart (0)</button>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6">
      <section id="homePage">
        <h2 class="text-lg font-semibold">Home</h2>
        <p class="mt-2 text-sm text-slate-600">Browse and search games here.</p>
        <div class="mt-4">
          <label for="searchInput" class="mb-1 block text-sm font-medium text-slate-700">Search games</label>
          <input id="searchInput" type="text" placeholder="Type a game name..." class="w-full rounded border border-slate-300 px-3 py-2 text-sm outline-none ring-slate-300 focus:ring" />
        </div>
        <div id="categoryFilters" class="mt-4 flex flex-wrap gap-2"></div>
        <div id="gamesGrid" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>

      <section id="cartPage" class="hidden">
        <h2 class="text-lg font-semibold">Cart</h2>
        <p class="mt-2 text-sm text-slate-600">Your selected games will appear here.</p>
        <div class="mt-6 grid gap-6 lg:grid-cols-3">
          <div id="cartItems" class="space-y-3 lg:col-span-2"></div>
          <aside class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h3 class="text-base font-semibold">Order Summary</h3>
            <div class="mt-3 space-y-2 text-sm">
              <div class="flex items-center justify-between"><span>Items</span><span id="summaryItems">0</span></div>
              <div class="flex items-center justify-between"><span>Subtotal</span><span id="summarySubtotal">$0.00</span></div>
              <div class="flex items-center justify-between border-t border-slate-200 pt-2 font-semibold"><span>Total</span><span id="summaryTotal">$0.00</span></div>
            </div>
            <div class="mt-4 space-y-2">
              <button id="checkoutBtn" class="w-full rounded bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Checkout</button>
              <button id="continueShoppingBtn" class="w-full rounded border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Continue Shopping</button>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="pointer-events-none fixed bottom-4 right-4 hidden rounded bg-slate-900 px-4 py-2 text-sm text-white shadow-lg"></div>

  <script src="index.js"></script>
</body>
</html>
